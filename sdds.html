<script>
function pos(element) {
  element.style.position = 'absolute';
  const sw = window.innerWidth;
  const sh = window.innerHeight;
  const ew = element.offsetWidth;
  const eh = element.offsetHeight;
  const ml = sw - ew;
  const mt = sh - eh;
  const rl = Math.floor(Math.random() * ml);
  const rt = Math.floor(Math.random() * mt);

  element.style.left = rl + 'px';
  element.style.top = rt + 'px';
}

setInterval(() => {

let elements = document.createElement(randomtag);
elements.textContent = `${randomtag}`;
elements.style.color = "blue";
elements.src = "media/pointer.webp";
