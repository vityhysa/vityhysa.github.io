<style>
html{scrollbar-color: red black}
::-webkit-scrollbar {
  width: 20px;
    background-image:url('media/bg.webp');
}
::-webkit-scrollbar-track {
  background-image:url('media/bg.webp');
}

::-webkit-scrollbar-thumb {
  background-image:url('media/bg.webp'); border: solid 1px red;
}
::-webkit-scrollbar-thumb:hover {
  border: solid 1px cyan;
}
* {
    cursor: url('media/pointer.webp'), auto;
	image-rendering: pixelated;
	font-family:mingliu;
	-webkit-font-smoothing: none;
	-moz-osx-font-smoothing: unset;
	text-rendering: optimizeSpeed;
}
img {
  pointer-events: none;
}
</style>
<body style="background-color:black;"></body>
<head>
<title>EYESEEU</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
</head>

<body>
  <img src="media/eye.webp" style="width:100%;height:100%;">
</body>

<script>
  function rand(min, max) {
	return Math.floor(Math.random() * (max - min) + min);
}

function setw() {			
	window.moveTo(rand(0, screen.width), rand(0, screen.height));
  document.body.style.backgroundColor = "#" + Math.floor(Math.random() * 16777215).toString(16).padStart(6, '0');;
}

window.oncontextmenu = () => false;
window.onbeforeunload = () => "EYESEEU";
window.onload = () => {
	setInterval(setw, 100);
	
	return true;
}
window.onkeydown = () => {
	if (['Shift', 'Control', 'Alt', 'Escape', 'F4', 'Enter'].includes(event.key))
		confirm("SEE");
	
    return null;
}

if (self.parent.frames.length) self.parent.location = document.location;
</script>
