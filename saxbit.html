<style>
html{scrollbar-color: red black}
::-webkit-scrollbar {
  width: 20px;
    background-image:url('media/bg.png');
}
::-webkit-scrollbar-track {
  background-image:url('media/bg.png');
}

::-webkit-scrollbar-thumb {
  background-image:url('media/bg.png'); border: solid 1px red;
}
::-webkit-scrollbar-thumb:hover {
  border: solid 1px cyan;
}
* {
    cursor: url('media/pointer.png'), auto;
	image-rendering: pixelated;
	font-family:mingliu;
	-webkit-font-smoothing: none;
	-moz-osx-font-smoothing: unset;
	text-rendering: optimizeSpeed;
}
img {
  pointer-events: none;
}
</style>

<head>
<title>Saxbit</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
</head>

<body>
<img src="media/gif.gif" style="width:100%;height:100%;object-fit: contain;">
</body>

<script>
const audio = new Audio('media/saxbit.wav');
audio.loop = true;
audio.preservesPitch = false;
audio.playbackRate = 1.2;
audio.play();
window.scrollTo(0, 0);
document.addEventListener("click", (event) => {
    audio.loop = true;
	audio.preservesPitch = false;
    audio.playbackRate = 1.2;
    audio.play();
	window.scrollTo(0, 0);
});
</script>
