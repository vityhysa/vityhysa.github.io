<style>
html{scrollbar-color: red black}
::-webkit-scrollbar {
  width: 20px;
    background-image:url('media/bg.png');
}
::-webkit-scrollbar-track {
  background-image:url('media/bg.png');
}

::-webkit-scrollbar-thumb {
  background-image:url('media/bg.png'); border: solid 1px red;
}
::-webkit-scrollbar-thumb:hover {
  border: solid 1px cyan;
}
* {
    cursor: url('media/pointer.png'), auto;
	image-rendering: pixelated;
	font-family:mingliu;
	-webkit-font-smoothing: none;
	-moz-osx-font-smoothing: unset;
	text-rendering: optimizeSpeed;
}
img {
  pointer-events: none;
}

</style>

<head>
<title>Hello</title>
<link rel="icon" type="image/x-icon" href="favicon.ico">
</head>

<button id="button" onclick="setTimeout(() => {document.getElementById('creepy').style.display = 'block';}, 50); openFullscreen(); document.getElementById('button').remove(); setTimeout(() => {window.location.href='tonight.html';}, 650);">Button</button>
<img id="creepy" src="media/creepy.png" style=";width:100%;height:100%;display: none;">


<body style="background-color:black;background-size: 0%;">

<script>
const elem = document.documentElement;

function openFullscreen() {
  if (elem.requestFullscreen) {
    elem.requestFullscreen();
  } else if (elem.webkitRequestFullscreen) {
    elem.webkitRequestFullscreen();
  } else if (elem.msRequestFullscreen) {
    elem.msRequestFullscreen();
  }
}
</script>
