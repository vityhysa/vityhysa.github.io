<script>
  document.body.style.overflow = 'hidden';

  }
  function clonesm(coolness) {
    const img = document.createElement('img');
    img.src = coolness.src

    img.width = coolness.width
    img.height = coolness.height

    img.style.position = 'absolute';
    img.style.left = coolness.style.left;
    img.style.top = coolness.style.top;

    img.style.transform = 'translate(0%, 0%)';
    setTimeout(() => {
      img.className += 'fade-out'
    }, 0);

    document.body.appendChild(img);

    setTimeout(() => {
      img.remove();
    }, 200);
  }
  function animate() {
    x += 2
    x1 += 1
    const xx = Math.sin(x1 * 0.01) * 550 + (window.innerWidth / 2) - 100;
    const y = Math.sin(x * 0.01) * 200 + (window.innerHeight / 2) - 100;
    element.style.left = xx + 'px';
    element.style.top = y + 'px';
    if (x > window.innerWidth) x = 0;
    requestAnimationFrame(animate);
    clonesm(element)
  }
